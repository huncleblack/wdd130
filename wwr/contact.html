<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description"
      content="Contact Huncleblack White Water Rafting for reservations, inquiries, and adventure support">
    <meta name="author" content="CHINWEUBA OGUGBUE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Huncleblack White Water Rafting Company</title>
    <link rel="stylesheet" href="styles/rafting.css">

</head>

<body>
    <header>
        <img src="images/raft-logo.jpg" alt="company logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>

    </header>
    <main>
        <section class="map">
            <h2>Our location</h2>
            <div class="google-map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d23111.332915743995!2d7.362924595714555!3d5.131767085665137!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sng!4v1775161939253!5m2!1sen!2sng"
                  loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
        </section>
        <section class="contact-info">
            <h2>Contact Information</h2>
            <p><strong>Address:</strong> No.130 School Road, Aba</p>
            <p><strong>Phone:</strong> +2348167607339</p>
            <p><strong>Email:</strong> chinweubaogugbue@gmail.com</p>
        </section>


        <section class="employees">
            <h2>Meet Our Team</h2>

            <div class="staffs">

                <figure>
                    <img src="images/manager.jpg" alt="Manager">
                    <figcaption>Sarah: Manager</figcaption>
                </figure>

                <figure>
                    <img src="images/guid.jpg" alt="Guide">
                    <figcaption>John: Tour Guide</figcaption>
                </figure>

                <figure>
                    <img src="images/employee.jpg" alt="field Support">
                    <figcaption>Jane: Support Staff</figcaption>
                </figure>
            </div>
        </section>
        <section class="contact-form">
            <h2>Send Us a Message</h2>

            <form>

                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <fieldset>
                    <legend>Purpose of message</legend>

                    <label>
                        <input type="radio" name="purpose" value="reservation">
                        Reservation Question
                    </label>

                    <label>
                        <input type="radio" name="purpose" value="general" required>
                        General Inquiry
                    </label>
                    <label>
                        <input type="radio" name="purpose" value="suggestion">
                        Website Suggestion
                    </label>

                </fieldset>


                <label for="message">Message:</label>
                <textarea id="message" name="message" required></textarea>

                <label>
                    <input type="checkbox" name="subscribe">
                    Subscribe to the monthly newsletter
                </label>

                <button type="submit">Send Message</button>

            </form>
        </section>


    </main>
    <footer>
        <p>&copy; 2026 | HUNCLEBLACK WHITE WATER RAFTING COMPANY | Chinweuba Ogugbue</p>
        <nav class="socialmedia">
            <a href="https://facebook.com" target="_blank">
                <img src="images/facebook.jpg" alt="Facebook">
            </a>

            <a href="https://instagram.com" target="_blank">
                <img src="images/instergram.jpg" alt="instagram">
            </a>

            <a href="https://linkedin.com" target="_blank">
                <img src="images/linkedin.jpg" alt="linkedin">
            </a>
        </nav>
    </footer>

</body>

</html>
